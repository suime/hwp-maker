document:
  author: 박대현
  description: |
    한글 1P 보고서 양식입니다.
  systemPrompt: |
    당신은 한국도로공사의 한글 1P 보고서 작성 전문가입니다.
    아래 가이드라인을 참고하여 보고서에 들어갈 문구를 생성합니다.

    ## 한국도로공사(ex) 문서 작성 수칙 및 가이드라인
    2. 문체 및 표현 방식 (Style & Tone)
    2.1. 개조식 서술 (Noun-Ending)
    모든 문장은 명사형이나 명사절로 종결합니다 (~함, ~음 등의 어미 대신 명사로 끝맺음).
    서술어 생략: '구축함', '추진할 계획임'
    rightarrow '구축', '추진'
    Bad: AI 통합관제 시스템을 구축할 예정입니다.
    Good: AI 통합관제 시스템 구축
    2.2. MECE 원칙 적용 (Mutually Exclusive, Collectively Exhaustive)
    각 항목은 상호 중복되지 않으면서도 전체를 포괄해야 합니다.
    업무계획 작성 시 누락된 요소가 없도록 논리적 완결성을 갖춰야 합니다.
    2.3. 정량적 성과 표기 (Quantitative Goals)
    성과 지표는 구체적인 수치로 제시하며, 변화량은 화살표(→)를 사용하여 시각화합니다.
    형식: (기존 수치) → (목표 수치)
    예: 답변품질 개선(81→90%), GPU 확보(65장 → 75장)
    2.4. 강조 및 태그 (Emphasis)
    국정과제: 해당 업무가 국정과제와 연관된 경우 문장 끝에 **국정과제**를 명기하여 강조합니다. [6], [2]
    핵심 키워드: 문단 내 중요한 수치나 키워드는 굵게 처리하거나 괄호 ( )를 활용하여 소주제를 명시합니다.
    예: ㅇ (인재육성) AI인재 채용·육성 및...

folders:
  - 기본 정보
  - AI 생성

variables:
  department:
    label: 작성 부서
    type: select
    folder: 기본 정보
    description: 문서에 표시할 작성 부서를 선택합니다.
    default: AI데이터처
    options:
      - AI데이터처
      - AX혁신처
      - 디지털관리처
  buso:
    label: 작성 부서명
    type: select
    folder: 기본 정보
    description: 보고서 작성 부서명으로 치환됩니다.
    optionsWhen:
      department:
        AI데이터처:
          - AI모델개발부
          - AI융합부
          - AI품질부
        AX혁신처:
          - AX계획부
          - 기계부
          - 행정부
        디지털관리처:
          - 인프라운영부
          - 정보보안센터

  name:
    label: 작성자
    type: text
    folder: 기본 정보
    description: 보고서 작성자 이름으로 치환됩니다.
    default: 박대현

  date:
    label: 작성일
    type: script
    folder: 기본 정보
    description: 현재 날짜를 한글 문서용 날짜 형식으로 자동 입력합니다.
    script: date("yyyy년 MM월 dd일 (aaa)")

  title:
    label: 제목
    type: text
    description: 작성 부서, 작성일, 작성자를 바탕으로 AI가 생성하는 보고서 제목입니다.
    default: 공사 특화 RAG 및 AI 데이터 구축 계획

  bg1:
    label: 추진배경1
    type: ai
    folder: AI 생성
    description: 보고서의 배경 정보
    prompt: |
      아래 정보를 바탕으로 한글 1P 보고서에 어울리는 배경 내용을 작성하세요.
      제목: {{title}}
      조건:
      - 해당 계획을 추진해야할 당위성을 회사 외부의 요인(정치, 경제적)을 고려하여 1줄로 작성
  bg2:
    label: 추진배경2
    type: ai
    folder: AI 생성
    description: 보고서의 배경 정보
    prompt: |
      아래 정보를 바탕으로 한글 1P 보고서에 어울리는 배경 내용을 작성하세요.
      제목: {{title}}
      조건:
      - 해당 계획을 추진해야할 당위성을 회사 내부의 요인(업무효율성 증대, 비용절감 등)에서 찾아서 1줄로 작성
